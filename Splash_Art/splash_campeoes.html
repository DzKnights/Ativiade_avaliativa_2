<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz of Legends - Splash Art</title>
    <link rel="icon" href="../default/logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="splash.css">
</head>

<body>

    <div id="popup-vitoria" class="popup-overlay" style="display: none;">
        <div class="popup-conteudo-vitoria">
            <h2>Parabéns!</h2>
            <p class="sub-vitoria">Você descobriu a splash art do campeão!</p>

            <div class="vitoria-campeao-card">
                <img id="popup-vitoria-img" src="" alt="Splash Art">
                <h1 id="popup-vitoria-nome-campeao">NOME DO CAMPEÃO</h1>
            </div>

            <p id="popup-vitoria-tentativas" class="stats-txt">Tentativas: <strong>0</strong></p>

            <div class="vitoria-center-action">
                <button id="popup-reiniciar" class="btn-acao-principal">JOGAR NOVAMENTE</button>
            </div>

            <div class="popup-container-modos">
                <h3>Escolha o Próximo Modo:</h3>
                <button id="btn-champions" class="btn-modo-menu">Champions</button>
                <button id="btn-falas" class="btn-modo-menu">Falas</button>
            </div>
            
        </div>
    </div>

    <div class="caixa-texto">

        <button class="menu" id="voltar">VOLTAR</button>
        <button class="menu" id="prox">PRÓXIMO</button>

        <div class="clear"></div>

        <img src="../default/logo.jpg" alt="logo" class="logo-top">
        <h3>Adivinhe a Splash Art do Campeão</h3>

        <div class="container-splash">
            <img id="splash-img" alt="Splash Art">
        </div>

        <p id="contador-tentativas">
            Tentativas: 0
        </p>

        <div class="container-tentativas-erradas">
            <h4 class="titulo-tentativas" style="display: none;">SUAS TENTATIVAS</h4>
            <div id="lista-tentativas-erradas"></div>
        </div>

        <div class="area-busca">
            <div class="wrapper-input">
                <input type="text" id="input-campeao" placeholder="Digite o nome do campeão..." autocomplete="off">
                <div id="lista-sugestoes" class="sugestoes-box"></div>
            </div>
            <button id="btn-enviar">➔</button>
        </div>
        
    </div>

    <audio id="audio-hover" src="../default/hover.mp3" preload="auto"></audio>
    <audio id="audio-click" src="../default/click.mp3" preload="auto"></audio>

    <script src="lista_splash.js"></script>
    <script src="splash_campeoes.js"></script>

</body>
</html>
