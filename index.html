<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz of Legends</title>
    <link rel="icon" href="../default/logo.jpg" type="image/jpeg">
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>

<body>

    <div id="popup-inicio" class="overlay-popup">
        <div class="conteudo-popup">
            <h2>Bem-vindo ao Quiz of Legends</h2>
            <p>Teste seus conhecimentos sobre</p>
            <img src="../default/logo.jpg" alt="logo">
            <button id="btn-iniciar-jogo">Iniciar Quiz</button>
        </div>
    </div>

    <div class="caixa-texto">
        <img src="default/logo.jpg" alt="logo">
        <h3>Você acha que sabe muito sobre league of legends</h3>
        
        <button id="btn-champions">Champions</button><br>
        <button id="btn-falas">Falas</button><br>
        <button id="btn-splash-campeoes">Splash art - Campeões</button><br>
    </div>

    <audio id="audio-hover" preload="auto"></audio>
    <audio id="audio-click" preload="auto"></audio>

</html>
